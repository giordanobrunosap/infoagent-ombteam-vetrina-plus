<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InfoAgent</title>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #fff; }
    .ia-panel, [id$="-panel"] { width: 100% !important; height: 100% !important; max-width: none !important; max-height: none !important; border-radius: 0 !important; box-shadow: none !important; }
  </style>
</head>
<body>
  <script>
  (function() {
    var params = new URLSearchParams(window.location.search);
    var lang = params.get('lang') || 'it';
    var persona = params.get('persona') || '';
    var mode = params.get('mode') || '';
    var open = params.get('open') || '';
    var apiBase = params.get('api') || 'https://infoagent-ombteam-vetrina.onrender.com';
    var apiUrl = apiBase.replace(/\/+$/, '');
    document.documentElement.lang = lang;
    var s = document.createElement('script');
    s.src = 'embed.js';
    s.setAttribute('data-api', apiUrl);
    s.setAttribute('data-lang', lang);
    s.setAttribute('data-theme', 'cadillac');
    s.setAttribute('data-position', 'right');
    if (persona) s.setAttribute('data-persona', persona);
    if (mode) s.setAttribute('data-mode', mode);
    if (open) s.setAttribute('data-open', open);

    // Fullscreen override only for embedded mode
    if (mode === 'embedded') {
      var embStyle = document.createElement('style');
      embStyle.textContent = [
        '.ia-panel[data-theme="cadillac"] .ia-app-container {',
        '  width: 100% !important; height: 100% !important;',
        '  max-width: none; border-radius: 0; box-shadow: none;',
        '}',
        '@media (max-width: 768px) {',
        '  .ia-panel[data-theme="cadillac"] .ia-app-container {',
        '    width: 100% !important; height: 100% !important; max-width: none;',
        '  }',
        '}',
      ].join('\n');
      document.head.appendChild(embStyle);
    }
    document.body.appendChild(s);
  })();
  </script>
</body>
</html>
